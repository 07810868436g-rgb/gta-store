version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gta_postgres
    restart: always
    # Docker сам подтянет пароли из нашего файла .env!
    env_file:
      - ../.env 
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  # Этот раздел гарантирует, что если мы выключим компьютер, 
  # ключи из базы данных не удалятся
  postgres_data: